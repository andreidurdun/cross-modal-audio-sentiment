# Configuration file for MSP-Podcast CCMT Model

# Training hyperparameters
training:
  learning_rate: 0.0001
  batch_size: 16
  num_epochs: 50
  weight_decay: 0.01
  warmup_steps: 500
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0

# Data paths
data:
  dataset_root: "MSP_Podcast"
  train_partition: "Train"
  val_partition: "Validation"
  test_partition: "Test1"
  audio_extension: ".wav"
  sample_rate: 16000

# Model architecture
model:
  audio_backbone: "microsoft/wavlm-base-plus"
  text_en_backbone: "bert-base-uncased"
  text_fr_backbone: "camembert-base"
  num_classes: 4
  hidden_dim: 768
  num_attention_heads: 8
  dropout: 0.1
  token_sample_k: 100

# Focal Loss parameters
loss:
  focal_loss_gamma: 2.0
  focal_loss_alpha: null

# ASR (Whisper) settings
asr:
  whisper_model: "openai/whisper-small"
  language: "en"
  task: "transcribe"

# Translation settings
translation:
  model: "google/flan-t5-base"
  source_lang: "English"
  target_lang: "French"
  max_length: 512

# Checkpointing
checkpoint:
  save_dir: "checkpoints"
  save_frequency: 5
  keep_last_n: 3

# Logging
logging:
  log_dir: "logs"
  tensorboard: true
  wandb: false
  print_frequency: 10
